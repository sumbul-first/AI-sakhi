{% extends "base.html" %}

{% block title %}{{ _('Error') }} {{ error_code }} - AI Sakhi{% endblock %}

{% block content %}
<div class="error-section">
    <div class="error-content">
        <div class="error-icon">
            {% if error_code == 404 %}
                🔍
            {% else %}
                ⚠️
            {% endif %}
        </div>
        <h2 class="error-title">{{ _('Error') }} {{ error_code }}</h2>
        <p class="error-message">{{ error_message }}</p>
        
        <div class="error-actions">
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                🏠 {{ _('Go Home') }}
            </a>
            <button onclick="history.back()" class="btn btn-secondary">
                ← {{ _('Go Back') }}
            </button>
        </div>
    </div>
</div>

<style>
.error-section {
    text-align: center;
    padding: var(--spacing-xl) 0;
    min-height: 400px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.error-content {
    max-width: 500px;
}

.error-icon {
    font-size: 4rem;
    margin-bottom: var(--spacing-md);
}

.error-title {
    font-size: 2rem;
    color: var(--primary-pink);
    margin-bottom: var(--spacing-sm);
}

.error-message {
    font-size: 1.1rem;
    color: var(--text-secondary);
    margin-bottom: var(--spacing-lg);
}

.error-actions {
    display: flex;
    gap: var(--spacing-md);
    justify-content: center;
    flex-wrap: wrap;
}
</style>
{% endblock %}
