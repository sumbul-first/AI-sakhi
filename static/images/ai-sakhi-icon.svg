<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF69B4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFB6C1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DDA0DD;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="heartGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC143C;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)" stroke="#FFF" stroke-width="4"/>
  
  <!-- Mother Figure (Simplified) -->
  <g id="mother-simple">
    <circle cx="50" cy="45" r="12" fill="#FDBCB4"/> <!-- Head -->
    <path d="M40 57 Q50 52 60 57 L58 75 Q50 78 42 75 Z" fill="#FF6347"/> <!-- Body -->
    <path d="M42 38 Q50 33 58 38" fill="#8B4513"/> <!-- Hair -->
    <circle cx="50" cy="42" r="1" fill="#DC143C"/> <!-- Bindi -->
  </g>
  
  <!-- Daughter Figure (Simplified) -->
  <g id="daughter-simple">
    <circle cx="78" cy="50" r="10" fill="#FDBCB4"/> <!-- Head -->
    <path d="M70 60 Q78 55 86 60 L84 75 Q78 78 72 75 Z" fill="#87CEEB"/> <!-- Body -->
    <path d="M70 43 Q78 38 86 43" fill="#8B4513"/> <!-- Hair -->
    <circle cx="72" cy="43" r="2" fill="#FF69B4"/> <!-- Hair ribbon -->
    <circle cx="84" cy="43" r="2" fill="#FF69B4"/> <!-- Hair ribbon -->
  </g>
  
  <!-- Heart Connection -->
  <path d="M60 50 C60 47, 66 47, 66 50 C66 47, 72 47, 72 50 C72 57, 66 63, 60 50" fill="url(#heartGrad)"/>
  
  <!-- AI Text -->
  <text x="64" y="95" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFF">AI</text>
  
  <!-- Sakhi Text -->
  <text x="64" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFF">SAKHI</text>
</svg>